<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 350px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border-top: 8px solid #006847; }
        .amount { font-size: 2.2rem; font-weight: bold; margin: 15px 0; color: #333; }
        .btn { background: #25D366; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
<div class="card" id="mainCard">
    <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/1/1e/Bank_of_Khartoum_logo.svg/200px-Bank_of_Khartoum_logo.svg.png" width="70">
    <div style="color:#006847; font-weight:bold;">تمت عملية التحويل بنجاح</div>
    <div class="amount" id="disp_amount">50,000.00 SDG</div>
    <div style="text-align:right; font-size:14px; color:#666;">
        <div>• التاريخ: <span id="disp_date"></span></div>
        <div style="color:red; margin-top:10px;">⚠️ إشعار تجريبي للمحاكاة فقط</div>
    </div>
    <button class="btn" onclick="sendWA()">إرسال واتساب ✅</button>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const m = urlParams.get('m') || '50,000';
    document.getElementById('disp_amount').innerText = m + ' SDG';
    document.getElementById('disp_date').innerText = new Date().toLocaleString('ar-SD');
    function sendWA() {
        const msg = encodeURIComponent(`*إشعار بنكك (تجريبي)*\nالمبلغ: ${m} SDG\nرابط الإشعار:\n${window.location.href}`);
        window.open(`https://wa.me/?text=${msg}`);
    }
</script>
</body>
</html>
