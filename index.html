<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إشعار بنكك</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; width: 90%; max-width: 350px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #006847; }
        .amount { font-size: 2rem; font-weight: bold; color: #333; margin: 15px 0; }
        .btn { background: #25D366; color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/1/1e/Bank_of_Khartoum_logo.svg/200px-Bank_of_Khartoum_logo.svg.png" width="60">
        <div style="color:#006847; font-weight:bold;">تمت عملية التحويل بنجاح</div>
        <div class="amount" id="disp_amount">50,000 SDG</div>
        <div style="text-align:right; font-size:0.8rem; color:#666;">
            <div>• التاريخ: <span id="disp_date"></span></div>
            <div style="color:red; font-size:10px; margin-top:10px;">⚠️ إشعار تجريبي - تختفي الصفحة تلقائياً</div>
        </div>
        <button class="btn" onclick="sendWhatsApp()">إرسال واتساب ✅</button>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const m = urlParams.get('m') || '50,000';
        document.getElementById('disp_amount').innerText = m + ' SDG';
        document.getElementById('disp_date').innerText = new Date().toLocaleString('ar-SD');
        function sendWhatsApp() {
            const msg = encodeURIComponent("إشعار بنكك تجريبي: " + window.location.href + "?m=" + m);
            window.open("https://wa.me/?text=" + msg);
        }
    </script>
</body>
</html>
